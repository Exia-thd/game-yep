<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>⚔️ Blade of Elements: Sushi Master</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#07070f; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; }
    canvas { display:block; cursor:crosshair; }
    .hub-btn {
      position:fixed; top:12px; left:12px; z-index:999;
      background:rgba(0,0,0,.55); color:rgba(255,210,120,.8);
      border:1px solid rgba(255,170,60,.3); font-family:'Segoe UI',sans-serif;
      font-size:.75rem; padding:6px 14px; border-radius:20px;
      cursor:pointer; text-decoration:none;
      backdrop-filter:blur(8px); transition:all .2s;
    }
    .hub-btn:hover { background:rgba(255,120,30,.2); color:#ffd080; border-color:rgba(255,170,60,.6); }
  </style>
</head>
<body>
<a class="hub-btn" href="index.html">🍣 ← HUB</a>
<canvas id="c"></canvas>
<script>
/* ════════════════════════════════════════════
   BLADE OF ELEMENTS: SUSHI MASTER
   ─ Slash ingredients, avoid bombs, chain combos
════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── Constants ── */
const GRAVITY      = 0.26;
const TRAIL_MAX    = 20;
const SLICE_THRESH = 10;   // min px/frame to count as slice
const STUN_FRAMES  = 90;   // 1.5s

/* ── Ingredient definitions ──
   r=radius  hp=hits-needed  pts=base-points  w=spawn-weight  spd=[min,max]
   fx: twohit | electric | zigzag | armored | bonus | bomb                   */
const DEFS = {
  tuna:    { e:'🐟', name:'Cá Ngừ Lửa',    col:'#ff3344', glow:'#ff7788', r:36, hp:2, pts:100, w:22, spd:[7,11], fx:'twohit'   },
  octopus: { e:'🐙', name:'Bạch Tuộc Điện', col:'#9922ff', glow:'#bb88ff', r:38, hp:1, pts:150, w:14, spd:[6,9],  fx:'electric' },
  seaweed: { e:'🌿', name:'Rong Biển Gió',  col:'#22ff88', glow:'#88ffbb', r:30, hp:1, pts:80,  w:22, spd:[8,13], fx:'zigzag'   },
  shrimp:  { e:'🦐', name:'Tôm Bọc Thép',  col:'#ff8833', glow:'#ffcc77', r:34, hp:2, pts:180, w:14, spd:[5,8],  fx:'armored'  },
  sushi:   { e:'🍣', name:'Sushi Thần',     col:'#ffd700', glow:'#ffe880', r:28, hp:1, pts:400, w:6,  spd:[9,14], fx:'bonus'    },
  bomb:    { e:'💣', name:'Bom',             col:'#333',    glow:'#888',    r:32, hp:1, pts:-1,  w:18, spd:[5,9],  fx:'bomb'     },
};

/* Weighted spawn pool */
const POOL = [];
Object.entries(DEFS).forEach(([k,d]) => { for (let i=0;i<d.w;i++) POOL.push(k); });

/* ── Game state ── */
const G = {
  state: 'menu',       // menu | play | gameover
  score: 0, lives: 3, combo: 0, maxCombo: 0, comboTimer: 0,
  ingredients: [], particles: [], floats: [], blossoms: [],
  stunned: 0,
  powerBar: 0, activePower: null, powerTimer: 0,
  spawnTimer: 0, spawnRate: 110,
  frame: 0,
  hs: +localStorage.getItem('sushi_hs') || 0,
  dead: false,
};

/* Mouse / touch state */
let mx = 0, my = 0;
const trail = [];  // {x,y,t}

/* ════════════════════════════════════════════
   INGREDIENT
════════════════════════════════════════════ */
class Ingredient {
  constructor(type) {
    const d = DEFS[type];
    this.type = type; this.def = d;
    this.r = d.r; this.hp = d.hp; this.maxHp = d.hp;

    // Spawn from bottom, random x
    this.x = d.r + Math.random() * (W - d.r*2);
    this.y = H + d.r;
    const spd = d.spd[0] + Math.random() * (d.spd[1] - d.spd[0]);
    const ang = -Math.PI/2 + (Math.random() - 0.5) * 0.7;
    this.vx = Math.cos(ang) * spd;
    this.vy = Math.sin(ang) * spd;

    this.rot = Math.random() * Math.PI*2;
    this.rotSpd = (Math.random() - 0.5) * 0.07;
    this.sliced = false; this.age = 0;

    // Zigzag (seaweed)
    this.zigT = 0; this.lastZig = 0;
    // Electric (octopus)
    this.flashT = 0; this.danger = false;
    // Armored (shrimp)
    this.shieldPulse = 0;
  }

  update(frozen) {
    this.age++;
    const sf = frozen ? 0.14 : 1;

    if (this.def.fx === 'zigzag') {
      this.zigT += 0.045 * sf;
      const zig = Math.sin(this.zigT * 3) * 38;
      this.x += this.vx * sf + (zig - this.lastZig);
      this.lastZig = zig;
    } else {
      this.x += this.vx * sf;
    }
    this.y  += this.vy * sf;
    this.vy += GRAVITY * sf;
    this.rot += this.rotSpd * sf;

    // Wall bounce
    if (this.x < this.r  && this.vx < 0) this.vx *= -0.65;
    if (this.x > W-this.r && this.vx > 0) this.vx *= -0.65;

    // Electric flash cycle: dangerous for 35 frames every 110 frames
    if (this.def.fx === 'electric') {
      this.flashT++;
      this.danger = (this.flashT % 110) < 35;
    }
    if (this.def.fx === 'armored' && this.hp > 1) {
      this.shieldPulse = (this.shieldPulse + 0.09) % (Math.PI*2);
    }

    return this.y > H + this.r * 2; // true = off-screen
  }

  draw() {
    const d = this.def;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    // Armored shield ring
    if (d.fx === 'armored' && this.hp > 1) {
      const a = 0.4 + 0.3 * Math.sin(this.shieldPulse);
      ctx.strokeStyle = `rgba(255,200,80,${a})`;
      ctx.lineWidth = 4;
      ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(0, 0, this.r + 9, 0, Math.PI*2); ctx.stroke();
    }

    // Tuna second-hit glow
    if (d.fx === 'twohit' && this.hp === 1) {
      ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 28;
    } else {
      ctx.shadowColor = this.danger ? '#00aaff' : d.glow;
      ctx.shadowBlur = 18;
    }

    // Electric arcs
    if (this.danger) {
      ctx.strokeStyle = 'rgba(0,190,255,0.75)';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 4; i++) {
        const a = (i/4)*Math.PI*2 + this.age * 0.12;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*this.r, Math.sin(a)*this.r);
        ctx.lineTo(Math.cos(a)*(this.r+16), Math.sin(a)*(this.r+16));
        ctx.stroke();
      }
    }

    // Emoji
    ctx.font = `${Math.round(this.r * 1.35)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.e, 0, 0);

    // Bomb fuse
    if (d.fx === 'bomb') {
      ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 2;
      ctx.shadowColor = '#ff9900'; ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(this.r*0.4, -this.r*0.6);
      ctx.quadraticCurveTo(this.r*0.9, -this.r*1.2, this.r*0.25, -this.r*1.45);
      ctx.stroke();
      if (this.age % 8 < 4) {
        ctx.fillStyle = '#ffff00';
        ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(this.r*0.25, -this.r*1.45, 3.5, 0, Math.PI*2); ctx.fill();
      }
    }

    ctx.restore();
  }
}

/* ════════════════════════════════════════════
   PARTICLES
════════════════════════════════════════════ */
function spawnParticles(x, y, col, n=10, star=false) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = (star ? 3 : 2) + Math.random() * (star ? 8 : 5);
    const life = 28 + Math.random() * 28;
    G.particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - (star?2.5:1),
      r: (star?4:2) + Math.random()*(star?5:3), col, life, maxLife: life, star });
  }
}

function spawnSlice(x, y, col) {
  spawnParticles(x, y, col, 14, false);
  // Sushi pieces
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 3 + Math.random() * 5;
    const life = 45 + Math.random() * 20;
    G.particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 2.5,
      r: 9 + Math.random() * 8, col, life, maxLife: 65, star: false, sushi: true });
  }
}

function drawParticles() {
  ctx.save();
  G.particles = G.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.98; p.life--;
    if (p.life <= 0) return false;
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col; ctx.shadowBlur = 6;
    if (p.star) {
      ctx.save(); ctx.translate(p.x, p.y);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (i/5)*Math.PI*2 - Math.PI/2;
        const a2 = ((i+0.5)/5)*Math.PI*2 - Math.PI/2;
        if (i===0) ctx.moveTo(Math.cos(a1)*p.r, Math.sin(a1)*p.r);
        else ctx.lineTo(Math.cos(a1)*p.r, Math.sin(a1)*p.r);
        ctx.lineTo(Math.cos(a2)*p.r*0.4, Math.sin(a2)*p.r*0.4);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    return true;
  });
  ctx.restore();
}

/* ════════════════════════════════════════════
   FLOAT TEXTS
════════════════════════════════════════════ */
function floatText(txt, x, y, col='#fff') {
  G.floats.push({ txt, x, y, vy: -2.2, life: 62, maxLife: 62, col });
}

function drawFloats() {
  const s = Math.min(W/800, 1.4);
  ctx.save();
  G.floats = G.floats.filter(f => {
    f.y += f.vy; f.life--;
    if (f.life <= 0) return false;
    ctx.globalAlpha = Math.min(1, f.life / 20);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.round(20*s)}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = f.col; ctx.shadowColor = f.col; ctx.shadowBlur = 10;
    ctx.fillText(f.txt, f.x, f.y);
    return true;
  });
  ctx.restore();
}

/* ════════════════════════════════════════════
   BLADE TRAIL
════════════════════════════════════════════ */
function drawTrail() {
  const now = Date.now();
  const pts = trail.filter(p => now - p.t < 180);
  if (pts.length < 2) return;
  const fire = G.activePower === 'fire';
  const dbl  = G.activePower === 'double';
  ctx.save();

  function drawLine(pts, yOff, alpha, col1, col2, glow) {
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i-1], p1 = pts[i];
      const age = (now - p1.t) / 180;
      const a = (1 - age) * 0.92 * alpha;
      if (a < 0.02) continue;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y + yOff);
      ctx.lineTo(p1.x, p1.y + yOff);
      ctx.lineWidth = (1 - age) * 9 + 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = fire
        ? `rgba(255,${Math.round(80+age*120)},0,${a})`
        : `rgba(255,255,255,${a})`;
      ctx.shadowColor = fire ? '#ff6600' : glow;
      ctx.shadowBlur = 16;
      ctx.stroke();
    }
  }

  drawLine(pts, 0,  1,   '#fff', '#88ddff', '#88ddff');
  if (dbl) {
    ctx.globalAlpha = 0.55;
    drawLine(pts, 44, 0.8, '#ffd700', '#ffd700', '#ffd700');
  }

  ctx.restore();
}

/* ════════════════════════════════════════════
   SLICE DETECTION
════════════════════════════════════════════ */
function segCircle(x1,y1,x2,y2,cx,cy,r) {
  const dx=x2-x1, dy=y2-y1, fx=x1-cx, fy=y1-cy;
  const a=dx*dx+dy*dy, b=2*(fx*dx+fy*dy), c=fx*fx+fy*fy-r*r;
  let d=b*b-4*a*c;
  if (d < 0) return false;
  d = Math.sqrt(d);
  const t1=(-b-d)/(2*a), t2=(-b+d)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

function trySlice(x1,y1,x2,y2) {
  if (G.stunned > 0 || G.state !== 'play') return;
  if (Math.hypot(x2-x1,y2-y1) < SLICE_THRESH) return;

  const dbl = G.activePower === 'double';

  G.ingredients.forEach(ing => {
    if (ing.sliced) return;
    const hit  = segCircle(x1,y1,x2,y2,ing.x,ing.y,ing.r);
    const hit2 = dbl && segCircle(x1,y1+44,x2,y2+44,ing.x,ing.y,ing.r);
    if (!hit && !hit2) return;

    /* Electric stun */
    if (ing.def.fx === 'electric' && ing.danger) {
      G.stunned = STUN_FRAMES;
      spawnParticles(ing.x, ing.y, '#00aaff', 18, true);
      floatText('⚡ STUNNED!', ing.x, ing.y - 40, '#44ddff');
      return;
    }

    /* Bomb */
    if (ing.def.fx === 'bomb') {
      if (G.activePower === 'fire') {
        spawnParticles(ing.x, ing.y, '#ff7700', 18, true);
        floatText('🔥 DEFLECTED!', ing.x, ing.y - 40, '#ff8800');
      } else {
        loseLife(ing.x, ing.y);
      }
      ing.sliced = true;
      return;
    }

    /* Normal hit */
    ing.hp--;
    if (ing.hp <= 0) {
      ing.sliced = true;
      const mult  = G.combo >= 5 ? 3 : G.combo >= 3 ? 2 : 1;
      const pts   = ing.def.pts * mult;
      G.score += pts; G.combo++; G.maxCombo = Math.max(G.maxCombo, G.combo);
      G.comboTimer = 100;
      G.powerBar = Math.min(100, G.powerBar + 8 + Math.min(G.combo, 8));

      const label = G.combo >= 3 ? `${G.combo}× COMBO! +${pts}` : `+${pts}`;
      const col   = G.combo >= 5 ? '#ffd700' : G.combo >= 3 ? '#ff9933' : '#ffffff';
      floatText(label, ing.x, ing.y - 36, col);
      spawnSlice(ing.x, ing.y, ing.def.col);
      if (hit2) spawnSlice(ing.x, ing.y + 44, ing.def.col);
      if (G.powerBar >= 100 && !G.activePower) activatePower();
    } else {
      /* Partial hit */
      spawnParticles(ing.x, ing.y, ing.def.col, 10);
      const msg = ing.def.fx === 'armored' ? '🛡 CRACKED!' : '💥 HIT!';
      floatText(msg, ing.x, ing.y - 36, ing.def.col);
    }
  });
}

/* ════════════════════════════════════════════
   LIVES & POWER-UPS
════════════════════════════════════════════ */
function loseLife(x, y) {
  G.lives--; G.combo = 0;
  spawnParticles(x, y, '#ff2222', 22, true);
  floatText('💥 BOOM!', x, y - 40, '#ff4444');
  if (G.lives <= 0 && !G.dead) {
    G.dead = true;
    setTimeout(() => {
      if (G.score > G.hs) { G.hs = G.score; localStorage.setItem('sushi_hs', G.hs); }
      G.state = 'gameover';
    }, 700);
  }
}

const POWER_SEQ = ['freeze','double','fire'];
let powerIdx = 0;
function activatePower() {
  G.activePower = POWER_SEQ[powerIdx++ % 3];
  G.powerTimer  = 310; G.powerBar = 0;
  const lbl = { freeze:'❄️ ĐÓNG BĂNG THỜI GIAN!', double:'⚔️ SONG KIẾM!', fire:'🔥 LỬA RỰC CHÁY!' };
  floatText(lbl[G.activePower], W/2, H/2, '#ffd700');
}

/* ════════════════════════════════════════════
   SPAWNER
════════════════════════════════════════════ */
function spawn() {
  G.ingredients.push(new Ingredient(POOL[Math.floor(Math.random()*POOL.length)]));
}

/* ════════════════════════════════════════════
   BACKGROUND
════════════════════════════════════════════ */
function initBlossoms() {
  G.blossoms = Array.from({length:32}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    vx:(Math.random()-.5)*.45, vy:.3+Math.random()*.5,
    rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.025,
    sz:4+Math.random()*8, a:.15+Math.random()*.5,
  }));
}

function drawBg() {
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#07070f'); grd.addColorStop(1,'#180a28');
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

  // Moon
  ctx.save();
  ctx.shadowColor = 'rgba(255,240,180,.6)'; ctx.shadowBlur = 50;
  ctx.fillStyle = 'rgba(255,248,220,.82)';
  ctx.beginPath(); ctx.arc(W-110, 80, 44, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Mountain silhouette
  ctx.fillStyle = '#0d0618';
  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(W*.28,H*.43); ctx.lineTo(W*.38,H*.6);
  ctx.lineTo(W*.6,H*.38);  ctx.lineTo(W*.73,H*.58);
  ctx.lineTo(W,   H*.48);  ctx.lineTo(W,H);
  ctx.closePath(); ctx.fill();

  // Ground line
  ctx.fillStyle = 'rgba(255,200,100,.07)';
  ctx.fillRect(0, H-2, W, 2);

  // Cherry blossoms
  G.blossoms.forEach(b => {
    b.x += b.vx; b.y += b.vy; b.rot += b.rs;
    if (b.y > H+20) { b.y=-10; b.x=Math.random()*W; }
    ctx.save();
    ctx.translate(b.x,b.y); ctx.rotate(b.rot);
    ctx.globalAlpha = b.a;
    ctx.fillStyle = '#ffaabb';
    for (let i=0;i<5;i++) {
      ctx.save(); ctx.rotate((i/5)*Math.PI*2);
      ctx.beginPath();
      ctx.ellipse(0,-b.sz*.65, b.sz*.32, b.sz*.58, 0, 0, Math.PI*2);
      ctx.fill(); ctx.restore();
    }
    ctx.restore();
  });
}

/* ════════════════════════════════════════════
   HUD
════════════════════════════════════════════ */
function drawHUD() {
  const s = Math.min(W/800, 1.3);
  ctx.save();
  ctx.shadowBlur = 0;

  // Score
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = `bold ${Math.round(30*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#ffd080'; ctx.shadowBlur = 14;
  ctx.fillText(G.score.toLocaleString(), 14, 14);
  ctx.font = `${Math.round(12*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = 'rgba(255,220,130,.45)'; ctx.shadowBlur = 0;
  ctx.fillText(`🏆 ${G.hs.toLocaleString()}`, 14, 52);

  // Combo
  if (G.combo >= 2) {
    const ca = Math.min(1, G.comboTimer / 40);
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.round(24*s)}px 'Segoe UI', sans-serif`;
    const cc = G.combo >= 5 ? '#ffd700' : '#ff9933';
    ctx.fillStyle = `rgba(${G.combo>=5?'255,210,0':'255,150,50'},${ca})`;
    ctx.shadowColor = cc; ctx.shadowBlur = 20;
    ctx.fillText(`${G.combo}× COMBO`, W/2, 14);
  }

  // Lives
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.font = `${Math.round(24*s)}px serif`;
  for (let i = 0; i < 3; i++) {
    ctx.globalAlpha = i < G.lives ? 1 : 0.18;
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10;
    ctx.fillText('❤️', W - 10 - (2-i)*34*s, 12);
  }
  ctx.globalAlpha = 1;

  // Stun bar
  if (G.stunned > 0) {
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.font = `bold ${Math.round(18*s)}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#44ccff'; ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 18;
    ctx.fillText(`⚡ STUNNED – ${(G.stunned/60).toFixed(1)}s`, W/2, H - 16);
  }

  // Power bar
  const pbx=16, pby=H-12, pbw=Math.round(170*s), pbh=Math.round(8*s);
  ctx.fillStyle = 'rgba(255,255,255,.08)'; ctx.shadowBlur = 0;
  ctx.fillRect(pbx, pby-pbh, pbw, pbh);
  const pwc = G.activePower==='fire' ? '#ff6600' : G.activePower==='freeze' ? '#44ddff' : G.activePower==='double' ? '#ffd700' : '#a855f7';
  ctx.fillStyle = pwc; ctx.shadowColor = pwc; ctx.shadowBlur = 8;
  ctx.fillRect(pbx, pby-pbh, pbw * (G.powerBar/100), pbh);
  ctx.strokeStyle = 'rgba(255,255,255,.18)'; ctx.lineWidth = 1; ctx.shadowBlur = 0;
  ctx.strokeRect(pbx, pby-pbh, pbw, pbh);

  // Power label
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.font = `${Math.round(9*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  if (G.activePower) {
    const icons = { freeze:'❄️', double:'⚔️', fire:'🔥' };
    ctx.fillText(`${icons[G.activePower]} ${G.activePower.toUpperCase()} – ${(G.powerTimer/60).toFixed(1)}s`, pbx, pby-pbh-4);
  } else {
    ctx.fillText(`POWER: ${Math.round(G.powerBar)}%`, pbx, pby-pbh-4);
  }

  ctx.restore();
}

/* ════════════════════════════════════════════
   SCREENS
════════════════════════════════════════════ */
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function btn(label, x, y, w, h, bg, tc='#000') {
  ctx.fillStyle = bg; ctx.shadowColor = bg; ctx.shadowBlur = 18;
  roundRect(x,y,w,h,h/2); ctx.fill(); ctx.shadowBlur = 0;
  ctx.fillStyle = tc;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(15*Math.min(W/800,1.3))}px 'Segoe UI', sans-serif`;
  ctx.fillText(label, x+w/2, y+h/2);
  return {x,y,w,h};
}

let startBtn, retryBtn, menuBtn2;

function drawMenu() {
  drawBg();
  const s = Math.min(W/800, 1.5);
  ctx.save(); ctx.textAlign = 'center';

  // Title
  ctx.shadowColor = 'rgba(255,170,50,.75)'; ctx.shadowBlur = 40;
  ctx.font = `900 ${Math.round(46*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = '#ffd080'; ctx.fillText('⚔️ BLADE OF ELEMENTS', W/2, H*.26);
  ctx.font = `700 ${Math.round(22*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = 'rgba(255,200,120,.85)';
  ctx.fillText('✨ SUSHI MASTER ✨', W/2, H*.26 + 52*s);
  ctx.shadowBlur = 0;

  // Orbiting ingredients preview
  ['🐟','🐙','🌿','🦐','🍣','💣'].forEach((e,i) => {
    const a = (i/6)*Math.PI*2 + G.frame*0.009;
    ctx.font = `${Math.round(30*s)}px serif`;
    ctx.fillText(e, W/2 + Math.cos(a)*110*s, H*.5 + Math.sin(a)*44*s);
  });

  // Rules
  ctx.font = `${Math.round(12.5*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  const rules = [
    '✂️ Vuốt nhanh để chém nguyên liệu',
    '🐟 Cá Ngừ & 🦐 Tôm: cần chém 2 lần  •  🌿 Rong Biển: bay zigzag',
    '🐙 Bạch Tuộc: ĐỪNG chém khi phát điện ⚡  •  💣 Bom: TRÁNH tuyệt đối!',
    '🔋 Tích combo → thanh năng lượng → kỹ năng đặc biệt tự kích hoạt',
  ];
  rules.forEach((r,i) => ctx.fillText(r, W/2, H*.66 + i*24*s));

  startBtn = btn('▶ BẮT ĐẦU', W/2-80*s, H*.8, 160*s, 48*s, 'rgba(255,150,40,.92)');

  ctx.font = `${Math.round(11*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = 'rgba(255,220,110,.4)';
  ctx.fillText(`🏆 Kỷ lục: ${G.hs.toLocaleString()}`, W/2, H*.94);
  ctx.restore();
}

function drawGameOver() {
  drawBg();
  const s = Math.min(W/800, 1.5);
  ctx.save(); ctx.textAlign = 'center';

  ctx.font = `900 ${Math.round(44*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = '#ff4444'; ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 32;
  ctx.fillText('⚔️ GAME OVER', W/2, H*.3);
  ctx.shadowBlur = 0;

  ctx.font = `bold ${Math.round(28*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = '#ffd080';
  ctx.fillText(G.score.toLocaleString(), W/2, H*.42);
  ctx.font = `${Math.round(14*s)}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.fillText(`Combo cao nhất: ${G.maxCombo}×  •  Kỷ lục: ${G.hs.toLocaleString()}`, W/2, H*.5);

  retryBtn = btn('🔄 CHƠI LẠI', W/2-80*s, H*.6, 160*s, 48*s, 'rgba(255,150,40,.92)');

  // Menu button
  ctx.fillStyle = 'rgba(255,255,255,.08)';
  ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.lineWidth = 1;
  const mx=W/2-55*s, my=H*.73, mw=110*s, mh=34*s;
  roundRect(mx,my,mw,mh,17*s); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.font = `${Math.round(13*s)}px 'Segoe UI', sans-serif`;
  ctx.textBaseline = 'middle';
  ctx.fillText('← Menu', W/2, my+mh/2);
  menuBtn2 = {x:mx,y:my,w:mw,h:mh};

  ctx.restore();
}

/* ════════════════════════════════════════════
   INPUT
════════════════════════════════════════════ */
function onMove(x,y) {
  const spd = Math.hypot(x-mx, y-my);
  if (spd > SLICE_THRESH && G.state === 'play') {
    trySlice(mx,my,x,y);
    trail.push({x,y,t:Date.now()});
    if (trail.length > TRAIL_MAX) trail.shift();
  }
  mx=x; my=y;
}

function onDown(x,y) {
  mx=x; my=y;
  function inBtn(b) { return b && x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h; }
  if (G.state==='menu'     && inBtn(startBtn))  startGame();
  if (G.state==='gameover' && inBtn(retryBtn))  startGame();
  if (G.state==='gameover' && inBtn(menuBtn2)) { G.state='menu'; initBlossoms(); }
}

canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

/* ════════════════════════════════════════════
   GAME INIT
════════════════════════════════════════════ */
function startGame() {
  Object.assign(G, {
    state:'play', score:0, lives:3, combo:0, maxCombo:0, comboTimer:0,
    ingredients:[], particles:[], floats:[], stunned:0,
    powerBar:0, activePower:null, powerTimer:0,
    spawnTimer:0, spawnRate:110, frame:0, dead:false,
  });
  trail.length = 0;
  initBlossoms();
}

/* ════════════════════════════════════════════
   MAIN LOOP
════════════════════════════════════════════ */
function loop() {
  G.frame++;
  ctx.clearRect(0,0,W,H);

  if (G.state === 'menu')     { drawMenu();     requestAnimationFrame(loop); return; }
  if (G.state === 'gameover') { drawGameOver(); requestAnimationFrame(loop); return; }

  /* ── PLAY ── */
  const frozen = G.activePower === 'freeze';
  drawBg();

  // Spawn
  G.spawnTimer++;
  if (G.spawnTimer >= G.spawnRate) {
    spawn(); G.spawnTimer = 0;
    G.spawnRate = Math.max(38, G.spawnRate - 0.25);
    if (G.score > 1500 && Math.random() < 0.3) spawn();
    if (G.score > 4000 && Math.random() < 0.2) spawn();
  }

  // Update ingredients
  G.ingredients = G.ingredients.filter(ing => {
    const off = ing.update(frozen);
    if (off && !ing.sliced && ing.def.fx !== 'bomb') {
      // Missed — lose a life
      G.lives--; G.combo = 0;
      floatText('Miss!', ing.x, H-45, '#ff8888');
      if (G.lives <= 0 && !G.dead) {
        G.dead = true;
        setTimeout(() => {
          if (G.score > G.hs) { G.hs=G.score; localStorage.setItem('sushi_hs',G.hs); }
          G.state = 'gameover';
        }, 700);
      }
    }
    if (off || ing.sliced) return false;
    ing.draw();
    return true;
  });

  drawParticles();
  drawTrail();
  drawFloats();
  drawHUD();

  // Tick timers
  if (G.stunned   > 0) G.stunned--;
  if (G.comboTimer > 0) { G.comboTimer--; if (!G.comboTimer) G.combo = 0; }
  if (G.activePower) { G.powerTimer--; if (G.powerTimer <= 0) G.activePower = null; }

  // Prune old trail points
  const now = Date.now();
  while (trail.length && now - trail[0].t > 200) trail.shift();

  requestAnimationFrame(loop);
}

initBlossoms();
loop();
</script>
